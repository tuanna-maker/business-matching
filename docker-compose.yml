services:
  api:
    image: ${IMAGE_REF:-registry-harbor.ubos.vn/business-matching/api:latest}
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      args:
        COREPACK_NPM_REGISTRY: ${COREPACK_NPM_REGISTRY:-https://registry.npmjs.org}
    container_name: iec-hub-api
    restart: unless-stopped
    ports:
      - "8008:3001"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3001
    networks:
      - iec-hub-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  web-v4:
    image: ${IMAGE_REF:-registry-harbor.ubos.vn/business-matching/web:latest}
    build:
      context: .
      dockerfile: apps/web-v4/Dockerfile
      args:
        COREPACK_NPM_REGISTRY: ${COREPACK_NPM_REGISTRY:-https://registry.npmjs.org}
    container_name: iec-hub-web-v4
    restart: unless-stopped
    ports:
      - "8011:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3000
    networks:
      - iec-hub-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  iec-hub-network:
    driver: bridge
